name: Build Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ─── Create GitHub Release (runs once, other jobs wait for it) ────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release (if not exists)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release view "$TAG" --repo "${{ github.repository }}" 2>/dev/null \
            && echo "Release $TAG already exists" \
            || gh release create "$TAG" --repo "${{ github.repository }}" \
                 --title "$TAG" --generate-notes --draft

  # ─── macOS Build ──────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [create-release]
    if: always() && !failure() && !cancelled()
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          # Uncomment to also build Intel:
          # - arch: x64
          #   runner: macos-13

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-wrapper/package-lock.json

      - name: Install zbar (for pyzbar QR decoding)
        run: brew install zbar

      - name: Generate icon.icns from icon.ico (if missing)
        run: |
          if [ -f images/icon.icns ]; then
            echo "icon.icns already present — skipping"
            exit 0
          fi
          if [ ! -f images/icon.ico ]; then
            echo "No icon.ico either — Electron will use default icon"
            exit 0
          fi
          echo "Generating icon.icns from icon.ico..."
          python3 -c "
          from PIL import Image
          im = Image.open('images/icon.ico')
          sizes = [(i.size[0], i) for i in [im]] if not hasattr(im, 'ico') else [(s, im) for s in im.ico.sizes()]
          im.size = max(im.ico.sizes()) if hasattr(im, 'ico') else im.size
          im.save('/tmp/icon-1024.png', format='PNG')
          " 2>/dev/null || sips -s format png images/icon.ico --out /tmp/icon-1024.png
          mkdir -p /tmp/icon.iconset
          for sz in 16 32 64 128 256 512 1024; do
            sips -z $sz $sz /tmp/icon-1024.png --out /tmp/icon.iconset/icon_${sz}x${sz}.png 2>/dev/null || true
          done
          iconutil -c icns /tmp/icon.iconset -o images/icon.icns
          echo "Created images/icon.icns"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend with PyInstaller
        run: pyinstaller your-everyday-tools.spec --clean --noconfirm

      - name: Stage backend into Electron resources
        run: |
          rm -rf electron-wrapper/resources/backend
          mkdir -p electron-wrapper/resources/backend
          cp -R dist/YourEverydayTools/. electron-wrapper/resources/backend/
          chmod +x electron-wrapper/resources/backend/YourEverydayTools

      - name: Install Electron dependencies
        working-directory: electron-wrapper
        run: npm ci || npm install

      - name: Build Electron DMG (${{ matrix.arch }})
        working-directory: electron-wrapper
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            electron-wrapper/dist/*.dmg
            electron-wrapper/dist/*.dmg.blockmap
            electron-wrapper/dist/latest-mac*.yml
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" \
            electron-wrapper/dist/*.dmg \
            electron-wrapper/dist/latest-mac*.yml \
            --clobber

  # ─── Windows Build ────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [create-release]
    if: always() && !failure() && !cancelled()
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron-wrapper/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build backend with PyInstaller
        run: pyinstaller your-everyday-tools.spec --clean --noconfirm

      - name: Stage backend into Electron resources
        shell: bash
        run: |
          rm -rf electron-wrapper/resources/backend
          mkdir -p electron-wrapper/resources/backend
          cp -R dist/YourEverydayTools/. electron-wrapper/resources/backend/

      - name: Install Electron dependencies
        working-directory: electron-wrapper
        run: npm ci || npm install

      - name: Build Electron NSIS Installer
        working-directory: electron-wrapper
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            electron-wrapper/dist/*.exe
            electron-wrapper/dist/latest.yml
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.ref_name }}" \
            electron-wrapper/dist/*.exe \
            electron-wrapper/dist/latest.yml \
            --clobber

  # ─── Publish Release (undraft after all builds attach) ────────────────────
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Undraft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" --draft=false
